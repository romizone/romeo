<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="800" y2="50" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="800" y2="100" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="800" y2="150" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="800" y2="250" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="800" y2="350" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="500" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- Document icons (left) -->
  <g transform="translate(80,160)">
    <!-- PDF doc 1 -->
    <rect x="0" y="0" width="70" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="8" y="10" width="54" height="4" rx="2" fill="#475569"/>
    <rect x="8" y="20" width="40" height="4" rx="2" fill="#475569"/>
    <rect x="8" y="30" width="50" height="4" rx="2" fill="#475569"/>
    <rect x="8" y="40" width="35" height="4" rx="2" fill="#475569"/>
    <rect x="8" y="50" width="48" height="4" rx="2" fill="#475569"/>
    <rect x="8" y="60" width="42" height="4" rx="2" fill="#475569"/>
    <rect x="8" y="74" width="24" height="10" rx="3" fill="#ef4444" opacity="0.9"/>
    <text x="14" y="82" font-family="monospace" font-size="7" fill="white" font-weight="bold">PDF</text>

    <!-- PDF doc 2 -->
    <rect x="20" y="100" width="70" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="28" y="110" width="54" height="4" rx="2" fill="#475569"/>
    <rect x="28" y="120" width="38" height="4" rx="2" fill="#475569"/>
    <rect x="28" y="130" width="50" height="4" rx="2" fill="#475569"/>
    <rect x="28" y="140" width="44" height="4" rx="2" fill="#475569"/>
    <rect x="28" y="150" width="36" height="4" rx="2" fill="#475569"/>
    <rect x="28" y="160" width="48" height="4" rx="2" fill="#475569"/>
    <rect x="28" y="174" width="30" height="10" rx="3" fill="#3b82f6" opacity="0.9"/>
    <text x="33" y="182" font-family="monospace" font-size="7" fill="white" font-weight="bold">DOCX</text>

    <!-- TXT doc -->
    <rect x="-10" y="200" width="70" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <rect x="-2" y="210" width="54" height="4" rx="2" fill="#475569"/>
    <rect x="-2" y="220" width="42" height="4" rx="2" fill="#475569"/>
    <rect x="-2" y="230" width="50" height="4" rx="2" fill="#475569"/>
    <rect x="-2" y="240" width="30" height="4" rx="2" fill="#475569"/>
    <rect x="-2" y="250" width="46" height="4" rx="2" fill="#475569"/>
    <rect x="-2" y="274" width="24" height="10" rx="3" fill="#22c55e" opacity="0.9"/>
    <text x="3" y="282" font-family="monospace" font-size="7" fill="white" font-weight="bold">TXT</text>
    <text x="35" y="320" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="middle" font-weight="600">SOP Documents</text>
  </g>

  <!-- Arrow 1: Docs to Chunking -->
  <g>
    <line x1="210" y1="290" x2="270" y2="240" stroke="url(#arrow)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="270,240 260,242 264,250" fill="#06b6d4" opacity="0.6"/>
    <text x="228" y="256" font-family="monospace" font-size="9" fill="#06b6d4" opacity="0.7" transform="rotate(-20,228,256)">chunk</text>
  </g>

  <!-- Chunking + Embedding block (center-left) -->
  <g transform="translate(275,170)">
    <rect x="0" y="0" width="140" height="140" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <text x="70" y="25" font-family="Arial,sans-serif" font-size="11" fill="#06b6d4" text-anchor="middle" font-weight="700">Text Chunking</text>

    <!-- Chunk blocks -->
    <rect x="12" y="38" width="116" height="16" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
    <rect x="16" y="42" width="60" height="8" rx="2" fill="#06b6d4" opacity="0.3"/>
    <text x="84" y="50" font-family="monospace" font-size="7" fill="#64748b">chunk_0</text>

    <rect x="12" y="58" width="116" height="16" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
    <rect x="16" y="62" width="48" height="8" rx="2" fill="#06b6d4" opacity="0.3"/>
    <text x="84" y="70" font-family="monospace" font-size="7" fill="#64748b">chunk_1</text>

    <rect x="12" y="78" width="116" height="16" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
    <rect x="16" y="82" width="55" height="8" rx="2" fill="#06b6d4" opacity="0.3"/>
    <text x="84" y="90" font-family="monospace" font-size="7" fill="#64748b">chunk_2</text>

    <text x="70" y="112" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">E5-Small 384d</text>
    <text x="70" y="126" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Embeddings</text>
  </g>

  <!-- Arrow 2: Chunking to Vector DB -->
  <g>
    <line x1="420" y1="240" x2="475" y2="240" stroke="url(#arrow)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="475,240 467,236 467,244" fill="#8b5cf6" opacity="0.6"/>
    <text x="437" y="232" font-family="monospace" font-size="9" fill="#8b5cf6" opacity="0.7">embed</text>
  </g>

  <!-- ChromaDB Vector Store (center) -->
  <g transform="translate(480,170)">
    <rect x="0" y="0" width="120" height="140" rx="12" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
    <text x="60" y="25" font-family="Arial,sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="700">ChromaDB</text>

    <!-- Vector dots visualization -->
    <g transform="translate(15,35)">
      <circle cx="15" cy="15" r="4" fill="#8b5cf6" opacity="0.5"/>
      <circle cx="35" cy="10" r="4" fill="#8b5cf6" opacity="0.7"/>
      <circle cx="55" cy="20" r="4" fill="#8b5cf6" opacity="0.4"/>
      <circle cx="75" cy="12" r="4" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="20" cy="35" r="4" fill="#8b5cf6" opacity="0.6"/>
      <circle cx="45" cy="40" r="4" fill="#8b5cf6" opacity="0.8"/>
      <circle cx="70" cy="38" r="4" fill="#8b5cf6" opacity="0.5"/>
      <circle cx="25" cy="55" r="4" fill="#8b5cf6" opacity="0.4"/>
      <circle cx="50" cy="58" r="4" fill="#8b5cf6" opacity="0.7"/>
      <circle cx="80" cy="55" r="4" fill="#8b5cf6" opacity="0.6"/>
      <!-- Highlighted search result -->
      <circle cx="45" cy="40" r="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
      <circle cx="35" cy="10" r="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.8"/>
    </g>

    <text x="60" y="110" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">cosine similarity</text>
    <text x="60" y="126" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">Top-K = 5</text>
  </g>

  <!-- Arrow 3: Vector DB to LLM -->
  <g>
    <line x1="605" y1="240" x2="640" y2="240" stroke="url(#arrow)" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="640,240 632,236 632,244" fill="#10b981" opacity="0.6"/>
    <text x="613" y="232" font-family="monospace" font-size="8" fill="#10b981" opacity="0.7">context</text>
  </g>

  <!-- DeepSeek LLM (right) -->
  <g transform="translate(645,180)">
    <rect x="0" y="0" width="110" height="120" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <text x="55" y="25" font-family="Arial,sans-serif" font-size="11" fill="#10b981" text-anchor="middle" font-weight="700">DeepSeek</text>
    <text x="55" y="42" font-family="monospace" font-size="8" fill="#64748b" text-anchor="middle">V3 LLM</text>

    <!-- Neural network mini icon -->
    <g transform="translate(20,50)">
      <circle cx="10" cy="8" r="4" fill="#10b981" opacity="0.4"/>
      <circle cx="10" cy="28" r="4" fill="#10b981" opacity="0.4"/>
      <circle cx="10" cy="48" r="4" fill="#10b981" opacity="0.4"/>
      <circle cx="40" cy="18" r="4" fill="#10b981" opacity="0.6"/>
      <circle cx="40" cy="38" r="4" fill="#10b981" opacity="0.6"/>
      <circle cx="70" cy="28" r="5" fill="#10b981" opacity="0.8"/>
      <line x1="14" y1="8" x2="36" y2="18" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="14" y1="8" x2="36" y2="38" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="14" y1="28" x2="36" y2="18" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="14" y1="28" x2="36" y2="38" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="14" y1="48" x2="36" y2="18" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="14" y1="48" x2="36" y2="38" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="44" y1="18" x2="66" y2="28" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
      <line x1="44" y1="38" x2="66" y2="28" stroke="#10b981" stroke-width="0.7" opacity="0.3"/>
    </g>
  </g>

  <!-- User Question (top) -->
  <g transform="translate(330,60)">
    <rect x="0" y="0" width="220" height="50" rx="25" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="26" y="22" font-family="Arial,sans-serif" font-size="18">&#128172;</text>
    <text x="50" y="24" font-family="Arial,sans-serif" font-size="11" fill="#f59e0b" font-weight="600">User Question</text>
    <text x="50" y="40" font-family="monospace" font-size="8" fill="#64748b">"Bagaimana SOP darurat...?"</text>
    <!-- Arrow down to vector DB -->
    <line x1="110" y1="50" x2="540" y2="170" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
    <polygon points="540,170 532,166 536,174" fill="#f59e0b" opacity="0.5"/>
  </g>

  <!-- AI Answer (bottom) -->
  <g transform="translate(330,390)">
    <rect x="0" y="0" width="320" height="55" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="16" y="22" font-family="Arial,sans-serif" font-size="16">&#129302;</text>
    <text x="40" y="22" font-family="Arial,sans-serif" font-size="11" fill="#10b981" font-weight="600">AI Answer + Source Attribution</text>
    <text x="40" y="40" font-family="monospace" font-size="8" fill="#64748b">"Berdasarkan SOP darurat pasal 5.2, langkah..."</text>
    <!-- Arrow up from LLM -->
    <line x1="700" y1="300" x2="600" y2="390" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
    <polygon points="600,390 604,382 596,382" fill="#10b981" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="480" font-family="Arial,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle" font-weight="700" letter-spacing="1">RAG SOP Assistant &#8212; Retrieval-Augmented Generation Pipeline</text>

  <!-- Gradio badge -->
  <g transform="translate(30,450)">
    <rect x="0" y="0" width="70" height="22" rx="6" fill="#ff7c00" opacity="0.15"/>
    <text x="35" y="15" font-family="monospace" font-size="9" fill="#ff7c00" text-anchor="middle" font-weight="600">Gradio</text>
  </g>
  <g transform="translate(110,450)">
    <rect x="0" y="0" width="70" height="22" rx="6" fill="#06b6d4" opacity="0.15"/>
    <text x="35" y="15" font-family="monospace" font-size="9" fill="#06b6d4" text-anchor="middle" font-weight="600">Python</text>
  </g>
  <g transform="translate(190,450)">
    <rect x="0" y="0" width="80" height="22" rx="6" fill="#8b5cf6" opacity="0.15"/>
    <text x="40" y="15" font-family="monospace" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="600">ChromaDB</text>
  </g>
</svg>