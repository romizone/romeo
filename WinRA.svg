<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <!-- macOS Window Chrome -->
  <rect width="800" height="520" rx="12" fill="#F5F5F7"/>
  <rect width="800" height="40" rx="12" fill="#E8E8ED"/>
  <rect y="28" width="800" height="12" fill="#E8E8ED"/>
  <!-- Traffic lights -->
  <circle cx="24" cy="20" r="7" fill="#FF5F57"/>
  <circle cx="46" cy="20" r="7" fill="#FEBC2E"/>
  <circle cx="68" cy="20" r="7" fill="#28C840"/>
  <!-- Window title -->
  <text x="400" y="25" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="500" fill="#3C3C43">WinRA</text>

  <!-- Sidebar -->
  <rect y="40" width="200" height="480" fill="#F0F0F2"/>
  <!-- Sidebar separator -->
  <line x1="200" y1="40" x2="200" y2="520" stroke="#D1D1D6" stroke-width="1"/>

  <!-- App branding -->
  <rect x="16" y="56" width="36" height="36" rx="8" fill="#007AFF"/>
  <text x="34" y="81" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="white">W</text>
  <text x="62" y="70" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">WinRA</text>
  <text x="62" y="86" font-family="system-ui,sans-serif" font-size="10" fill="#6E6E73">Archive Manager</text>

  <!-- Separator -->
  <line x1="16" y1="104" x2="184" y2="104" stroke="#D1D1D6" stroke-width="1"/>

  <!-- TOOLS label -->
  <text x="20" y="124" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#AEAEB2" letter-spacing="1">TOOLS</text>

  <!-- Extract Archive button (active) -->
  <rect x="10" y="134" width="180" height="34" rx="8" fill="#007AFF"/>
  <text x="46" y="156" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white">Extract Archive</text>

  <!-- Compress Files button -->
  <text x="46" y="190" font-family="system-ui,sans-serif" font-size="12" fill="#1D1D1F">Compress Files</text>

  <!-- Convert Format button -->
  <text x="46" y="222" font-family="system-ui,sans-serif" font-size="12" fill="#1D1D1F">Convert Format</text>

  <!-- Light Mode + toggle -->
  <text x="46" y="470" font-family="system-ui,sans-serif" font-size="10" fill="#6E6E73">Light Mode</text>
  <rect x="140" y="460" width="38" height="20" rx="10" fill="#D1D1D6"/>
  <circle cx="150" cy="470" r="8" fill="white"/>
  <text x="100" y="496" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#AEAEB2">v1.0 for macOS</text>

  <!-- Main Content Area -->
  <!-- Toolbar -->
  <rect x="200" y="40" width="600" height="44" fill="#F8F8FA"/>
  <line x1="200" y1="84" x2="800" y2="84" stroke="#D1D1D6" stroke-width="1"/>
  <text x="224" y="67" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Extract Archive</text>

  <!-- Action Card -->
  <rect x="220" y="100" width="560" height="100" rx="14" fill="white" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Drop Zone -->
  <rect x="232" y="112" width="120" height="76" rx="10" fill="#E3F0FF" stroke="#007AFF" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="292" y="152" text-anchor="middle" font-family="system-ui,sans-serif" font-size="24">&#128194;</text>
  <text x="292" y="176" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#007AFF">Open archive file</text>

  <!-- File info -->
  <text x="370" y="132" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1D1D1F">No file selected</text>
  <text x="370" y="152" font-family="system-ui,sans-serif" font-size="10" fill="#6E6E73">Open an archive or add files to get started</text>

  <!-- Extract button -->
  <rect x="650" y="112" width="116" height="36" rx="10" fill="#007AFF"/>
  <text x="708" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="white">Extract</text>

  <!-- Browse output button -->
  <rect x="650" y="156" width="116" height="30" rx="8" fill="none" stroke="#007AFF" stroke-width="1"/>
  <text x="708" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#007AFF">Browse output...</text>

  <!-- Output bar -->
  <rect x="220" y="214" width="560" height="34" rx="10" fill="white" stroke="#E5E5EA" stroke-width="1"/>
  <text x="236" y="236" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6E6E73">Output:</text>
  <text x="288" y="236" font-family="system-ui,sans-serif" font-size="10" fill="#AEAEB2">Select output location...</text>
  <rect x="696" y="220" width="76" height="22" rx="6" fill="#E8E8ED"/>
  <text x="734" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#6E6E73">Show in Finder</text>

  <!-- Tree Card -->
  <rect x="220" y="260" width="560" height="230" rx="14" fill="white" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Tree header -->
  <text x="240" y="284" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#1D1D1F">Archive Contents</text>
  <line x1="220" y1="296" x2="780" y2="296" stroke="#E5E5EA" stroke-width="1"/>

  <!-- Tree column headers -->
  <text x="240" y="316" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6E6E73">Name</text>
  <text x="580" y="316" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6E6E73">Size</text>
  <text x="670" y="316" text-anchor="end" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6E6E73">Packed</text>
  <text x="730" y="316" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6E6E73">Kind</text>
  <line x1="232" y1="324" x2="768" y2="324" stroke="#E5E5EA" stroke-width="0.5"/>

  <!-- Empty state -->
  <text x="500" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="30" fill="#AEAEB2">&#128193;</text>
  <text x="500" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#1D1D1F">No files to display</text>
  <text x="500" y="438" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6E6E73">Open a ZIP or RAR archive</text>
  <text x="500" y="452" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#6E6E73">to view and extract its contents.</text>

  <!-- Progress bar -->
  <text x="220" y="508" font-family="system-ui,sans-serif" font-size="10" fill="#AEAEB2">Ready</text>
  <rect x="264" y="500" width="516" height="5" rx="2.5" fill="#D1D1D6"/>
  <rect x="264" y="500" width="8" height="5" rx="2.5" fill="#007AFF"/>
</svg>