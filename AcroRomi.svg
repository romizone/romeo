<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa"/>
      <stop offset="100%" style="stop-color:#e9ecef"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="400" y2="50" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="400" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="400" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="400" y2="250" stroke="#fff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- PDF Document - back page -->
  <g filter="url(#shadow)" transform="translate(85, 35)">
    <rect x="8" y="8" width="140" height="185" rx="4" fill="#dee2e6" opacity="0.5"/>
  </g>

  <!-- PDF Document - main page -->
  <g filter="url(#shadow)" transform="translate(80, 30)">
    <rect width="145" height="190" rx="4" fill="url(#page)"/>
    <!-- PDF header bar -->
    <rect width="145" height="24" rx="4" fill="#e94560"/>
    <rect y="20" width="145" height="4" fill="#e94560"/>
    <text x="10" y="16" font-family="SF Pro Display, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#fff">PDF</text>
    <!-- Page fold -->
    <path d="M115 0 L145 30 L115 30 Z" fill="#d63851" opacity="0.4"/>
    <!-- Text lines -->
    <rect x="12" y="36" width="90" height="5" rx="2" fill="#adb5bd"/>
    <rect x="12" y="46" width="120" height="4" rx="2" fill="#ced4da"/>
    <rect x="12" y="55" width="105" height="4" rx="2" fill="#ced4da"/>
    <rect x="12" y="64" width="115" height="4" rx="2" fill="#ced4da"/>
    <rect x="12" y="73" width="80" height="4" rx="2" fill="#ced4da"/>
    <!-- Highlight annotation -->
    <rect x="12" y="86" width="120" height="14" rx="3" fill="#ffe066" opacity="0.45"/>
    <rect x="14" y="89" width="100" height="4" rx="2" fill="#adb5bd"/>
    <rect x="14" y="96" width="70" height="4" rx="2" fill="#adb5bd"/>
    <!-- More text -->
    <rect x="12" y="108" width="115" height="4" rx="2" fill="#ced4da"/>
    <rect x="12" y="117" width="95" height="4" rx="2" fill="#ced4da"/>
    <rect x="12" y="126" width="110" height="4" rx="2" fill="#ced4da"/>
    <!-- Redaction block -->
    <rect x="12" y="140" width="80" height="10" rx="2" fill="#343a40"/>
    <!-- Signature area -->
    <g transform="translate(12, 158)">
      <rect width="60" height="22" rx="3" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="3,2"/>
      <path d="M8 16 Q15 6 22 14 Q28 8 35 12 Q40 6 50 14" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7"/>
      <text x="4" y="8" font-family="SF Pro Text, sans-serif" font-size="4" fill="#e94560" opacity="0.6">Signature</text>
    </g>
  </g>

  <!-- Annotation tools panel -->
  <g transform="translate(245, 45)" filter="url(#shadow)">
    <rect width="110" height="170" rx="8" fill="#0f3460" opacity="0.95"/>
    <rect width="110" height="28" rx="8" fill="#e94560"/>
    <rect y="20" width="110" height="8" fill="#e94560"/>
    <text x="12" y="18" font-family="SF Pro Display, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#fff">&#9998; Tools</text>

    <!-- Tool items -->
    <g transform="translate(10, 38)">
      <!-- Highlight -->
      <rect width="90" height="18" rx="4" fill="#1a1a4e" opacity="0.6"/>
      <rect x="6" y="5" width="12" height="8" rx="2" fill="#ffe066" opacity="0.7"/>
      <text x="24" y="12" font-family="SF Pro Text, sans-serif" font-size="7" fill="#e0e0e0">Highlight</text>
    </g>
    <g transform="translate(10, 62)">
      <!-- Notes -->
      <rect width="90" height="18" rx="4" fill="#1a1a4e" opacity="0.6"/>
      <rect x="6" y="4" width="10" height="10" rx="2" fill="#4ecdc4" opacity="0.7"/>
      <text x="24" y="12" font-family="SF Pro Text, sans-serif" font-size="7" fill="#e0e0e0">Notes</text>
    </g>
    <g transform="translate(10, 86)">
      <!-- Draw -->
      <rect width="90" height="18" rx="4" fill="#1a1a4e" opacity="0.6"/>
      <circle cx="12" cy="9" r="5" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
      <text x="24" y="12" font-family="SF Pro Text, sans-serif" font-size="7" fill="#e0e0e0">Shapes</text>
    </g>
    <g transform="translate(10, 110)">
      <!-- OCR -->
      <rect width="90" height="18" rx="4" fill="#e94560" opacity="0.3"/>
      <text x="6" y="12" font-family="SF Mono, monospace" font-size="7" font-weight="600" fill="#ff6b6b">OCR</text>
      <text x="30" y="12" font-family="SF Pro Text, sans-serif" font-size="7" fill="#e0e0e0">Recognize</text>
    </g>
    <g transform="translate(10, 134)">
      <!-- Sign -->
      <rect width="90" height="18" rx="4" fill="#1a1a4e" opacity="0.6"/>
      <path d="M8 14 Q13 5 18 12 Q22 7 28 10" fill="none" stroke="#a78bfa" stroke-width="1.5" transform="translate(0,-2)"/>
      <text x="34" y="12" font-family="SF Pro Text, sans-serif" font-size="7" fill="#e0e0e0">Sign</text>
    </g>
  </g>

  <!-- App title -->
  <g filter="url(#glow)">
    <text x="200" y="262" font-family="SF Pro Display, -apple-system, Helvetica Neue, sans-serif" font-size="22" font-weight="800" fill="url(#accent)" text-anchor="middle" letter-spacing="2">AcroRomi</text>
  </g>
  <text x="200" y="280" font-family="SF Pro Text, -apple-system, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">Native PDF Editor for macOS</text>

  <!-- macOS window dots (decorative) -->
  <g transform="translate(88, 38)">
    <circle cx="0" cy="0" r="3" fill="#ff5f57"/>
    <circle cx="10" cy="0" r="3" fill="#febc2e"/>
    <circle cx="20" cy="0" r="3" fill="#28c840"/>
  </g>
</svg>