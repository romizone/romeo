<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="red1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8d4b0"/>
      <stop offset="100%" style="stop-color:#eebfa0"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1f3a"/>
      <stop offset="100%" style="stop-color:#0f0f20"/>
    </linearGradient>
    <linearGradient id="blazerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e4070"/>
      <stop offset="100%" style="stop-color:#152d52"/>
    </linearGradient>
    <linearGradient id="lipGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e87070"/>
      <stop offset="100%" style="stop-color:#d45a5a"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="avatarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="70%" style="stop-color:#3b82f6;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Spotlight on presenter -->
  <ellipse cx="400" cy="200" rx="280" ry="220" fill="url(#spotlight)"/>

  <!-- Circular avatar glow -->
  <ellipse cx="400" cy="210" rx="140" ry="150" fill="url(#avatarGlow)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="42" fill="#111827" opacity="0.95"/>
  <rect x="0" y="42" width="800" height="1" fill="#1e293b"/>

  <!-- AI NEWS STUDIO text -->
  <text x="30" y="28" font-family="'Georgia',serif" font-size="16" fill="#e2e8f0" font-weight="700" letter-spacing="1">AI</text>
  <text x="52" y="28" font-family="'Georgia',serif" font-size="16" fill="#e2e8f0" font-weight="400" font-style="italic" letter-spacing="1"> NEWS</text>
  <text x="108" y="28" font-family="'Georgia',serif" font-size="16" fill="#e2e8f0" font-weight="700" letter-spacing="1"> STUDIO</text>

  <!-- LIVE badge -->
  <g transform="translate(220,10)">
    <rect x="0" y="0" width="58" height="24" rx="5" fill="url(#red1)"/>
    <circle cx="16" cy="12" r="4" fill="#fff" opacity="0.9"/>
    <text x="38" y="16" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="800" text-anchor="middle">LIVE</text>
  </g>

  <!-- Clock -->
  <text x="760" y="28" font-family="'Courier New',monospace" font-size="13" fill="#94a3b8" text-anchor="end" font-weight="600">20:49:47</text>

  <!-- BREAKING news ticker -->
  <rect x="0" y="44" width="800" height="26" fill="#dc2626" opacity="0.9"/>
  <rect x="0" y="44" width="90" height="26" fill="#b91c1c"/>
  <text x="45" y="61" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="800" text-anchor="middle">BREAKING</text>
  <text x="100" y="61" font-family="Arial,sans-serif" font-size="10" fill="white" opacity="0.9">Simulasi Pembawa Berita Menggunakan Text-to-Speech dengan Avatar Animasi</text>

  <!-- ============ PRESENTER AVATAR ============ -->
  <g transform="translate(400,240)">
    <!-- Neck -->
    <rect x="-12" y="18" width="24" height="28" rx="8" fill="url(#skinGrad)"/>

    <!-- Blazer / Body -->
    <path d="M-80,46 Q-80,30 -40,26 L-14,26 L0,46 L14,26 L40,26 Q80,30 80,46 L80,120 L-80,120 Z" fill="url(#blazerGrad)"/>
    <!-- Blazer lapels -->
    <path d="M-14,26 L0,46 L14,26" fill="none" stroke="#264b82" stroke-width="1.5"/>
    <!-- White shirt / collar inside -->
    <path d="M-14,26 L-6,40 L0,32 L6,40 L14,26" fill="white" opacity="0.9"/>
    <!-- Necklace -->
    <circle cx="0" cy="40" r="3.5" fill="#d4a017" opacity="0.8"/>

    <!-- Head shape -->
    <ellipse cx="0" cy="-20" rx="52" ry="62" fill="url(#skinGrad)"/>

    <!-- Hair - back layer -->
    <path d="M-54,-30 Q-54,-85 0,-90 Q54,-85 54,-30 Q54,-50 42,-62 Q20,-78 0,-80 Q-20,-78 -42,-62 Q-54,-50 -54,-30 Z" fill="url(#hairGrad)"/>
    <!-- Hair - side left -->
    <path d="M-54,-30 Q-58,-10 -52,8 Q-48,0 -50,-20 Z" fill="url(#hairGrad)"/>
    <!-- Hair - side right -->
    <path d="M54,-30 Q58,-10 52,8 Q48,0 50,-20 Z" fill="url(#hairGrad)"/>
    <!-- Bangs -->
    <path d="M-34,-55 Q-20,-45 -10,-55 Q0,-62 10,-55 Q20,-45 34,-55 Q20,-70 0,-72 Q-20,-70 -34,-55 Z" fill="url(#hairGrad)"/>

    <!-- Eyebrows -->
    <path d="M-28,-34 Q-20,-40 -10,-36" fill="none" stroke="#2d2d4a" stroke-width="2" stroke-linecap="round"/>
    <path d="M10,-36 Q20,-40 28,-34" fill="none" stroke="#2d2d4a" stroke-width="2" stroke-linecap="round"/>

    <!-- Eyes - white -->
    <ellipse cx="-20" cy="-22" rx="12" ry="9" fill="white"/>
    <ellipse cx="20" cy="-22" rx="12" ry="9" fill="white"/>
    <!-- Eyes - iris -->
    <circle cx="-18" cy="-22" r="6" fill="#1a1a2e"/>
    <circle cx="22" cy="-22" r="6" fill="#1a1a2e"/>
    <!-- Eyes - pupil -->
    <circle cx="-17" cy="-23" r="3" fill="#000"/>
    <circle cx="23" cy="-23" r="3" fill="#000"/>
    <!-- Eyes - highlight -->
    <circle cx="-15" cy="-25" r="1.8" fill="white" opacity="0.8"/>
    <circle cx="25" cy="-25" r="1.8" fill="white" opacity="0.8"/>

    <!-- Nose -->
    <path d="M0,-8 Q-4,2 -2,6 Q0,8 2,6 Q4,2 0,-8" fill="none" stroke="#d4a88a" stroke-width="1" opacity="0.5"/>

    <!-- Mouth (closed, slight smile) -->
    <path d="M-12,12 Q-6,18 0,16 Q6,18 12,12" fill="url(#lipGrad)" stroke="#c45050" stroke-width="0.5"/>

    <!-- Earrings -->
    <circle cx="-50" cy="-6" r="4" fill="#d4a017" opacity="0.85"/>
    <circle cx="50" cy="-6" r="4" fill="#d4a017" opacity="0.85"/>
  </g>

  <!-- News Desk (in front of presenter) -->
  <g transform="translate(150,360)">
    <rect x="0" y="0" width="500" height="50" rx="6" fill="url(#deskGrad)" stroke="#1e293b" stroke-width="1.5"/>
    <rect x="0" y="0" width="500" height="3" rx="2" fill="#334155" opacity="0.5"/>
    <!-- Desk text strip -->
    <rect x="140" y="16" width="220" height="20" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="250" y="30" font-family="'Courier New',monospace" font-size="10" fill="#64748b" text-anchor="middle" letter-spacing="3">AI NEWS</text>
  </g>

  <!-- Subtitle area -->
  <g transform="translate(180,420)">
    <rect x="0" y="0" width="440" height="36" rx="6" fill="#0f172a" opacity="0.85" stroke="#1e293b" stroke-width="1"/>
    <text x="220" y="14" font-family="Arial,sans-serif" font-size="9" fill="#64748b" text-anchor="middle" font-style="italic">Masukkan teks berita dan tekan "Mulai Siaran" &#8594;</text>
    <!-- Simulated word spans -->
    <text x="20" y="30" font-family="Arial,sans-serif" font-size="9" fill="#94a3b8">Selamat malam, pemirsa. Kembali bersama saya dalam program</text>
  </g>

  <!-- Audio Equalizer bars (left) -->
  <g transform="translate(42,280)">
    <rect x="0" y="40" width="5" height="30" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="8" y="28" width="5" height="42" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="16" y="16" width="5" height="54" rx="2" fill="#3b82f6" opacity="0.6"/>
    <rect x="24" y="34" width="5" height="36" rx="2" fill="#3b82f6" opacity="0.45"/>
    <rect x="32" y="22" width="5" height="48" rx="2" fill="#3b82f6" opacity="0.55"/>
    <rect x="40" y="38" width="5" height="32" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="48" y="10" width="5" height="60" rx="2" fill="#3b82f6" opacity="0.5"/>
  </g>

  <!-- Audio Equalizer bars (right) -->
  <g transform="translate(708,280)">
    <rect x="0" y="30" width="5" height="40" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="8" y="18" width="5" height="52" rx="2" fill="#3b82f6" opacity="0.55"/>
    <rect x="16" y="36" width="5" height="34" rx="2" fill="#3b82f6" opacity="0.45"/>
    <rect x="24" y="12" width="5" height="58" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="32" y="26" width="5" height="44" rx="2" fill="#3b82f6" opacity="0.5"/>
    <rect x="40" y="40" width="5" height="30" rx="2" fill="#3b82f6" opacity="0.4"/>
    <rect x="48" y="20" width="5" height="50" rx="2" fill="#3b82f6" opacity="0.55"/>
  </g>

  <!-- Floating particles -->
  <circle cx="120" cy="140" r="2" fill="#3b82f6" opacity="0.15"/>
  <circle cx="680" cy="120" r="2.5" fill="#3b82f6" opacity="0.12"/>
  <circle cx="90" cy="380" r="1.5" fill="#3b82f6" opacity="0.1"/>
  <circle cx="720" cy="400" r="2" fill="#3b82f6" opacity="0.12"/>
  <circle cx="300" cy="95" r="1.5" fill="#f59e0b" opacity="0.1"/>
  <circle cx="550" cy="100" r="1.5" fill="#f59e0b" opacity="0.1"/>

  <!-- Title -->
  <text x="400" y="486" font-family="Arial,sans-serif" font-size="13" fill="#64748b" text-anchor="middle" font-weight="700" letter-spacing="1">AI News Presenter &#8212; Virtual Anchor with Bilingual TTS</text>

  <!-- Tech badges -->
  <g transform="translate(30,462)">
    <rect x="0" y="0" width="60" height="20" rx="5" fill="#e34f26" opacity="0.15"/>
    <text x="30" y="14" font-family="monospace" font-size="8" fill="#e34f26" text-anchor="middle" font-weight="600">HTML5</text>
  </g>
  <g transform="translate(98,462)">
    <rect x="0" y="0" width="48" height="20" rx="5" fill="#1572b6" opacity="0.15"/>
    <text x="24" y="14" font-family="monospace" font-size="8" fill="#1572b6" text-anchor="middle" font-weight="600">CSS3</text>
  </g>
  <g transform="translate(154,462)">
    <rect x="0" y="0" width="78" height="20" rx="5" fill="#f7df1e" opacity="0.15"/>
    <text x="39" y="14" font-family="monospace" font-size="8" fill="#f7df1e" text-anchor="middle" font-weight="600">JavaScript</text>
  </g>
  <g transform="translate(240,462)">
    <rect x="0" y="0" width="90" height="20" rx="5" fill="#3b82f6" opacity="0.15"/>
    <text x="45" y="14" font-family="monospace" font-size="8" fill="#3b82f6" text-anchor="middle" font-weight="600">Speech API</text>
  </g>
  <g transform="translate(338,462)">
    <rect x="0" y="0" width="48" height="20" rx="5" fill="#22c55e" opacity="0.15"/>
    <text x="24" y="14" font-family="monospace" font-size="8" fill="#22c55e" text-anchor="middle" font-weight="600">SVG</text>
  </g>
</svg>
