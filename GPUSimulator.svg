<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="50%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="tpuGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="glowCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="glowGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="glowOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="280" fill="url(#bg)" rx="12"/>
  <!-- Ambient orbs -->
  <circle cx="50" cy="45" r="30" fill="url(#glowCyan)" opacity="0.5"/>
  <circle cx="200" cy="25" r="25" fill="url(#glowGreen)" opacity="0.4"/>
  <circle cx="355" cy="50" r="28" fill="url(#glowOrange)" opacity="0.4"/>
  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" fill="#f1f5f9" font-family="sans-serif" font-size="15" font-weight="700">GPU vs CPU vs TPU Simulator</text>
  <text x="200" y="48" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">AI Workload Performance Race</text>
  <!-- Race lanes -->
  <!-- CPU Lane -->
  <rect x="30" y="65" width="340" height="48" rx="8" fill="#0c1524" stroke="#164e63" stroke-width="1"/>
  <text x="42" y="82" fill="#06b6d4" font-family="monospace" font-size="11" font-weight="700">CPU</text>
  <text x="42" y="96" fill="#67e8f9" font-family="monospace" font-size="7" opacity="0.8">8 Cores @ 5.0 GHz</text>
  <!-- CPU progress bar -->
  <rect x="130" y="74" width="225" height="14" rx="4" fill="#0e2433" stroke="#164e63" stroke-width="0.8"/>
  <rect x="131" y="75" width="60" height="12" rx="3" fill="url(#cpuGrad)" opacity="0.85"/>
  <text x="360" y="85" text-anchor="end" fill="#22d3ee" font-family="monospace" font-size="8">27%</text>
  <!-- CPU core grid -->
  <g transform="translate(133, 95)">
    <rect x="0" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.9"/>
    <rect x="7" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.7"/>
    <rect x="14" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.8"/>
    <rect x="21" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.6"/>
    <rect x="28" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.9"/>
    <rect x="35" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.5"/>
    <rect x="42" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.7"/>
    <rect x="49" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.8"/>
    <rect x="56" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.6"/>
    <rect x="63" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.9"/>
    <rect x="70" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.4"/>
    <rect x="77" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.7"/>
    <rect x="84" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.8"/>
    <rect x="91" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.5"/>
    <rect x="98" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.9"/>
    <rect x="105" y="0" width="5" height="5" rx="1" fill="#06b6d4" opacity="0.6"/>
  </g>
  <!-- GPU Lane -->
  <rect x="30" y="120" width="340" height="48" rx="8" fill="#0c1524" stroke="#14532d" stroke-width="1"/>
  <text x="42" y="137" fill="#22c55e" font-family="monospace" font-size="11" font-weight="700">GPU</text>
  <text x="42" y="151" fill="#86efac" font-family="monospace" font-size="7" opacity="0.8">4096 CUDA @ 1.8 GHz</text>
  <!-- GPU progress bar -->
  <rect x="130" y="129" width="225" height="14" rx="4" fill="#0e2418" stroke="#14532d" stroke-width="0.8"/>
  <rect x="131" y="130" width="165" height="12" rx="3" fill="url(#gpuGrad)" opacity="0.85"/>
  <text x="360" y="140" text-anchor="end" fill="#4ade80" font-family="monospace" font-size="8">73%</text>
  <!-- GPU core grid (many small dots) -->
  <g transform="translate(133, 150)" fill="#22c55e">
    <rect x="0" y="0" width="3" height="3" rx="0.5" opacity="0.8"/><rect x="4" y="0" width="3" height="3" rx="0.5" opacity="0.6"/>
    <rect x="8" y="0" width="3" height="3" rx="0.5" opacity="0.9"/><rect x="12" y="0" width="3" height="3" rx="0.5" opacity="0.5"/>
    <rect x="16" y="0" width="3" height="3" rx="0.5" opacity="0.7"/><rect x="20" y="0" width="3" height="3" rx="0.5" opacity="0.8"/>
    <rect x="24" y="0" width="3" height="3" rx="0.5" opacity="0.6"/><rect x="28" y="0" width="3" height="3" rx="0.5" opacity="0.9"/>
    <rect x="32" y="0" width="3" height="3" rx="0.5" opacity="0.7"/><rect x="36" y="0" width="3" height="3" rx="0.5" opacity="0.5"/>
    <rect x="40" y="0" width="3" height="3" rx="0.5" opacity="0.8"/><rect x="44" y="0" width="3" height="3" rx="0.5" opacity="0.6"/>
    <rect x="48" y="0" width="3" height="3" rx="0.5" opacity="0.9"/><rect x="52" y="0" width="3" height="3" rx="0.5" opacity="0.7"/>
    <rect x="56" y="0" width="3" height="3" rx="0.5" opacity="0.5"/><rect x="60" y="0" width="3" height="3" rx="0.5" opacity="0.8"/>
    <rect x="64" y="0" width="3" height="3" rx="0.5" opacity="0.6"/><rect x="68" y="0" width="3" height="3" rx="0.5" opacity="0.9"/>
    <rect x="72" y="0" width="3" height="3" rx="0.5" opacity="0.7"/><rect x="76" y="0" width="3" height="3" rx="0.5" opacity="0.8"/>
    <rect x="80" y="0" width="3" height="3" rx="0.5" opacity="0.5"/><rect x="84" y="0" width="3" height="3" rx="0.5" opacity="0.9"/>
    <rect x="88" y="0" width="3" height="3" rx="0.5" opacity="0.6"/><rect x="92" y="0" width="3" height="3" rx="0.5" opacity="0.7"/>
    <rect x="96" y="0" width="3" height="3" rx="0.5" opacity="0.8"/><rect x="100" y="0" width="3" height="3" rx="0.5" opacity="0.9"/>
    <rect x="104" y="0" width="3" height="3" rx="0.5" opacity="0.5"/><rect x="108" y="0" width="3" height="3" rx="0.5" opacity="0.7"/>
  </g>
  <!-- TPU Lane -->
  <rect x="30" y="175" width="340" height="48" rx="8" fill="#0c1524" stroke="#7c2d12" stroke-width="1"/>
  <text x="42" y="192" fill="#f97316" font-family="monospace" font-size="11" font-weight="700">TPU</text>
  <text x="42" y="206" fill="#fdba74" font-family="monospace" font-size="7" opacity="0.8">128x128 Systolic @ 940 MHz</text>
  <!-- TPU progress bar -->
  <rect x="130" y="184" width="225" height="14" rx="4" fill="#241509" stroke="#7c2d12" stroke-width="0.8"/>
  <rect x="131" y="185" width="210" height="12" rx="3" fill="url(#tpuGrad)" opacity="0.85"/>
  <text x="360" y="195" text-anchor="end" fill="#fb923c" font-family="monospace" font-size="8">93%</text>
  <!-- TPU systolic array grid -->
  <g transform="translate(133, 205)" fill="#f97316">
    <rect x="0" y="0" width="4" height="4" rx="0.5" opacity="0.9"/><rect x="5" y="0" width="4" height="4" rx="0.5" opacity="0.7"/>
    <rect x="10" y="0" width="4" height="4" rx="0.5" opacity="0.8"/><rect x="15" y="0" width="4" height="4" rx="0.5" opacity="0.6"/>
    <rect x="20" y="0" width="4" height="4" rx="0.5" opacity="0.9"/><rect x="25" y="0" width="4" height="4" rx="0.5" opacity="0.7"/>
    <rect x="30" y="0" width="4" height="4" rx="0.5" opacity="0.5"/><rect x="35" y="0" width="4" height="4" rx="0.5" opacity="0.8"/>
    <rect x="40" y="0" width="4" height="4" rx="0.5" opacity="0.9"/><rect x="45" y="0" width="4" height="4" rx="0.5" opacity="0.6"/>
    <rect x="50" y="0" width="4" height="4" rx="0.5" opacity="0.7"/><rect x="55" y="0" width="4" height="4" rx="0.5" opacity="0.9"/>
    <rect x="60" y="0" width="4" height="4" rx="0.5" opacity="0.8"/><rect x="65" y="0" width="4" height="4" rx="0.5" opacity="0.5"/>
    <rect x="70" y="0" width="4" height="4" rx="0.5" opacity="0.7"/><rect x="75" y="0" width="4" height="4" rx="0.5" opacity="0.9"/>
    <rect x="80" y="0" width="4" height="4" rx="0.5" opacity="0.6"/><rect x="85" y="0" width="4" height="4" rx="0.5" opacity="0.8"/>
    <rect x="90" y="0" width="4" height="4" rx="0.5" opacity="0.9"/><rect x="95" y="0" width="4" height="4" rx="0.5" opacity="0.7"/>
  </g>
  <!-- Medal badges -->
  <circle cx="353" y="202" r="8" fill="#f97316" opacity="0.2"/>
  <!-- Bottom bar - workload info -->
  <rect x="30" y="235" width="340" height="30" rx="6" fill="#0e1726" stroke="#1e293b" stroke-width="0.8"/>
  <text x="50" y="254" fill="#64748b" font-family="monospace" font-size="8">Workload:</text>
  <text x="102" y="254" fill="#94a3b8" font-family="monospace" font-size="8">Matrix Mul 1024x1024</text>
  <text x="260" y="254" fill="#64748b" font-family="monospace" font-size="8">Batch:</text>
  <text x="290" y="254" fill="#94a3b8" font-family="monospace" font-size="8">128</text>
  <text x="318" y="254" fill="#64748b" font-family="monospace" font-size="8">Speed:</text>
  <text x="350" y="254" fill="#94a3b8" font-family="monospace" font-size="8">1x</text>
</svg>